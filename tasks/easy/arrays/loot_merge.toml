level             = "easy"
name              = "loot_merge"
tags              = ["arrays", "sorting", "pirates"]
time_to_solve_sec = 200

description_en = """
Two pirate crews bring sorted loot lists `port_loot` and `starboard_loot`, where each number is a crate weight in nondecreasing order.

Merge both loot lists into one summary. Return a sorted array of pairs `[weight, count]`, where `count` is how many crates of that weight appear in total across both crews.
"""

description_ru = """
Две пиратские команды приносят отсортированные списки добычи `port_loot` и `starboard_loot`, где каждое число — это вес ящика, а элементы идут в неубывающем порядке.

Объедините оба списка добычи в одну сводку. Верните отсортированный массив пар `[weight, count]`, где `count` показывает, сколько ящиков такого веса всего есть у обеих команд.
"""

limits = """
- $0 \\leq \\lvert \\text{port\\_loot} \\rvert,\\ \\lvert \\text{starboard\\_loot} \\rvert \\leq 100$
- $0 \\leq \\text{port\\_loot}[i],\\ \\text{starboard\\_loot}[i] \\leq 100$
- $\\text{port\\_loot}[i] \\leq \\text{port\\_loot}[i+1]$
- $\\text{starboard\\_loot}[i] \\leq \\text{starboard\\_loot}[i+1]$
"""

solution = """
def solution(port_loot: list[int], starboard_loot: list[int]) -> list[list[int]]:
    c = {}
    for x in port_loot + starboard_loot:
        c[x] = c.get(x, 0) + 1
    return [[x, c[x]] for x in sorted(c)]
"""

examples = """
solution([], []) == []
solution([1], []) == [[1, 1]]
solution([2, 2], [2]) == [[2, 3]]
solution([1, 1, 3], [1, 2, 2]) == [[1, 3], [2, 2], [3, 1]]
"""

