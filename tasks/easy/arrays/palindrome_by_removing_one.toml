[[asserts]]
arguments = [[9, 8, 7, 8, 9, 10]]
comment   = "Remove 10"
expected  = true

[[asserts]]
arguments = [[10, 9, 8, 7, 8, 9]]
comment   = "Remove 10"
expected  = true

[[asserts]]
arguments = [[1, 2, 1, 3, 1, 2, 1]]
