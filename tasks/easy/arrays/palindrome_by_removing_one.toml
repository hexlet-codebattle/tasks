[[asserts]]
arguments = [[1, 1, 2, 1]]
comment   = "Remove 2"
expected  = true

[[asserts]]
arguments = [[1, 2, 1, 1]]
comment   = "Remove 2"
expected  = true

[[asserts]]
arguments = [[2, 1, 1, 1]]
comment   = "Remove 2"
expected  = true

[[asserts]]
arguments = [[1, 1, 1, 2]]
comment   = "Remove 2"
expected  = true

[[asserts]]
arguments = [[1, 2, 3, 4, 3, 2, 1]]
comment   = "Odd length palindrome"
expected  = true

[[asserts]]
arguments = [[1, 2, 3, 4, 4, 3, 2, 1]]
comment   = "Even length palindrome"
expected  = true

[[asserts]]
arguments = [[1, 2, 3, 5, 4, 3, 2, 1]]
comment   = "Remove 5 or 4"
expected  = true

[[asserts]]
arguments = [[1, 2, 3, 1, 2, 3]]
comment   = "Repeated sequence"
expected  = false

[[asserts]]
arguments = [[100, 200, 300, 200, 100]]
comment   = "Large values"
expected  = true

[[asserts]]
arguments = [[5, 5, 6, 5]]
