level             = "easy"
name              = "permutation_period"
tags              = ["arrays", "math", "simulation"]
time_to_solve_sec = 250

description_en = """
You are given an array `p` of length $n$ containing integers from $0$ to $n - 1$.

Imagine we have an initial array $\\text{arr} = [0, 1, 2, \\dots, n - 1]$.
In one step, we permute the elements of $\\text{arr}$ such that the new array is $\\text{new\\_arr}$, where $\\text{new\\_arr}[i] = \\text{arr}[p[i]]$.

Return the minimum number of steps required to return $\\text{arr}$ to its initial state $[0, 1, 2, \\dots, n - 1]$. 
If it is impossible to ever return to the initial state, return $-1$.
"""

description_ru = """
Вам дан массив `p` длины $n$, содержащий целые числа от $0$ до $n - 1$.

Представьте, что у нас есть исходный массив $\\text{arr} = [0, 1, 2, \\dots, n - 1]$.
За один шаг мы переставляем элементы $\\text{arr}$ так, что получается новый массив $\\text{new\\_arr}$, где $\\text{new\\_arr}[i] = \\text{arr}[p[i]]$.

Верните минимальное количество шагов, за которое массив $\\text{arr}$ вернется в свое исходное состояние $[0, 1, 2, \\dots, n - 1]$. 
Если вернуться в исходное состояние невозможно, верните $-1$.
"""

limits = """
- $1 \\leq \\text{len}(p) \\leq 30$
- $0 \\leq p[i] < \\text{len}(p)$
"""

solution = """
def solution(p: list[int]) -> int:
    if len(set(p)) != len(p): return -1
    curr, target, steps = list(p), list(range(len(p))), 1
    while curr != target: curr, steps = [curr[i] for i in p], steps + 1
    return steps
"""

examples = """
solution([0]) == 1
solution([1, 0]) == 2
solution([1, 2, 0]) == 3
solution([0, 1, 1]) == -1
solution([1, 2, 0, 4, 3]) == 6
"""

[[input_signature]]
argument_name = "p"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "integer"

[output_signature.type]
name = "integer"

[[asserts]]
arguments = [[0]]
comment   = "Length 1, identical"
expected  = 1

[[asserts]]
arguments = [[1, 0]]
comment   = "Length 2, swap"
expected  = 2

[[asserts]]
