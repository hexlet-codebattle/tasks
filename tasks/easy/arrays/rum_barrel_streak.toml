level             = "easy"
name              = "rum_barrel_streak"
tags              = ["arrays", "pirates"]
time_to_solve_sec = 150

description_en = """
The deck has a row of rum barrels. `barrels[i]` is the amount of rum in the `i`-th barrel.

A barrel is considered full enough if its amount is strictly greater than `0`.

Return the length of the longest consecutive streak of full-enough barrels.
"""

description_ru = """
На палубе стоит ряд бочек с ромом. `barrels[i]` — количество рома в `i`-й бочке.

Бочка считается достаточно полной, если количество рома в ней строго больше `0`.

Верните длину самой длинной подряд идущей серии достаточно полных бочек.
"""

limits = """
- $0 \\leq \\text{len}(\\text{barrels}) \\leq 100$
- $0 \\leq \\text{barrels}[i] \\leq 100$
"""

solution = """
def solution(barrels: list[int]) -> int:
    best = cur = 0
    for x in barrels:
        cur = cur + 1 if x > 0 else 0
        best = max(best, cur)
    return best
"""

examples = """
solution([]) == 0
solution([5]) == 1
solution([1, 0, 1]) == 1
solution([0, 9, 9, 9, 9, 9, 0]) == 5
"""

[[input_signature]]
argument_name = "barrels"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "integer"

[output_signature.type]
name = "integer"

[[asserts]]
arguments = [[]]
comment   = "Empty row"
expected  = 0

[[asserts]]
arguments = [[0]]
comment   = "Single empty barrel"
expected  = 0

[[asserts]]
arguments = [[5]]
comment   = "Single full barrel"
expected  = 1

