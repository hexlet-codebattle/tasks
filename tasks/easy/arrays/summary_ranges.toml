level             = "easy"
name              = "summary_ranges"
tags              = ["arrays", "strings"]
time_to_solve_sec = 300

description_en = """
You are given a sorted array of unique integers `nums`.

Return the smallest sorted list of ranges that cover all the numbers in the array exactly. That is, each element of `nums` is covered by exactly one of the ranges, and there is no integer `x` such that `x` is in one of the ranges but not in `nums`.

Each range `[a, b]` in the list should be formatted as:
- `"a->b"` if $a \\neq b$
- `"a"` if $a = b$
"""

description_ru = """
Вам дан отсортированный массив уникальных целых чисел `nums`.

Верните минимальный отсортированный список диапазонов, которые в точности покрывают все числа в массиве. Это означает, что каждый элемент `nums` покрыт ровно одним диапазоном, и не существует такого целого числа `x`, которое находится в одном из диапазонов, но отсутствует в `nums`.

Каждый диапазон `[a, b]` в списке должен быть отформатирован как:
- `"a->b"`, если $a \\neq b$
- `"a"`, если $a = b$
"""

limits = """
- $0 \\leq \\text{len}(nums) \\leq 10^4$
- $-10^9 \\leq nums[i] \\leq 10^9$
- $nums$ is strictly increasing
"""

solution = """
def solution(nums: list[int]) -> list[str]:
    res = []
    for n in nums:
        if res and res[-1][1] == n - 1:
            res[-1][1] = n
        else:
            res.append([n, n])
    return [f"{s}->{e}" if s != e else str(s) for s, e in res]
"""

examples = """
solution([]) == []
solution([-1]) == ["-1"]
solution([0, 1, 2, 4, 5, 7]) == ["0->2", "4->5", "7"]
solution([0, 2, 3, 4, 6, 8, 9]) == ["0", "2->4", "6", "8->9"]
"""

[[input_signature]]
argument_name = "nums"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "integer"

[output_signature.type]
name = "array"
[output_signature.type.nested]
name = "string"

[[asserts]]
