level             = "easy"
name              = "town_judge"
tags              = ["arrays", "graphs"]
time_to_solve_sec = 250

description_en = """
In a town, there are $n$ people labeled from $1$ to $n$. There is a rumor that one of these people is secretly the town judge.

The town judge satisfies two properties:
1. The town judge trusts nobody.
2. Everybody (except for the town judge) trusts the town judge.

You are given an array `trust` where `trust[i] = [a, b]` representing that the person labeled `a` trusts the person labeled `b`.

Return the label of the town judge if they exist and can be identified, or return `-1` otherwise.
"""

description_ru = """
В городе живут $n$ людей, пронумерованных от $1$ до $n$. Ходят слухи, что один из них — городской судья.

Судья должен соответствовать двум условиям:
1. Судья никому не доверяет.
2. Все остальные жители города (кроме самого судьи) доверяют судье.

Вам дан массив пар `trust`, где `trust[i] = [a, b]` означает, что человек `a` доверяет человеку `b`.

Верните номер городского судьи, если он существует, иначе верните `-1`.
"""

limits = """
- $1 \\leq n \\leq 1000$
- $0 \\leq \\text{len}(\\text{trust}) \\leq 10^4$
- $\\text{trust}[i][0] \\neq \\text{trust}[i][1]$
"""

solution = """
def solution(n: int, trust: list) -> int:
    d = [0] * (n + 1)
    for a, b in trust:
        d[a] -= 1
        d[b] += 1
    for i in range(1, n + 1):
        if d[i] == n - 1:
            return i
    return -1
"""

examples = """
solution(2, [[1, 2]]) == 2
solution(3, [[1, 3], [2, 3]]) == 3
solution(3, [[1, 3], [2, 3], [3, 1]]) == -1
solution(3, [[1, 2], [2, 3]]) == -1
"""

