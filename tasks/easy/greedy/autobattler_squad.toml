level             = "easy"
name              = "autobattler_squad"
tags              = ["math", "greedy", "logic"]
time_to_solve_sec = 240

description_en = """
In the game Autobattler, players form a squad by purchasing warriors from a shop.

The upgrade system works as follows:
- $3$ **normal** warriors automatically convert into $1$ **upgraded** warrior.
- $3$ **upgraded** warriors automatically convert into $1$ **best** warrior.

Each unit type has a specific strength value:
- **Normal**: $1$
- **Upgraded**: $4$
- **Best**: $16$

You have purchased $n$ normal warriors. However, you can only field a squad of at most $k$ warriors of any quality.

Determine the maximum possible total strength of your squad.
"""

description_ru = """
В игре Autobattler каждый игрок формирует свой отряд, покупая воинов из магазина.

Система улучшений работает следующим образом:
- $3$ **обычных** воина преобразуются в $1$ **усиленного** воина.
- $3$ **усиленных** воина преобразуются в $1$ **лучшего** воина.

Каждый тип юнита имеет определенную силу:
- **Обычный**: $1$
- **Усиленный**: $4$
- **Лучший**: $16$

Вы купили $n$ обычных воинов. Однако в отряд можно выставить не более $k$ воинов любого качества.

Определите максимальную суммарную силу отряда, который вы сможете сформировать.
"""

limits = """
- $0 \\leq n \\leq 10^9$
- $0 \\leq k \\leq 10^9$
"""

solution = """
def solution(n: int, k: int) -> int:
    u, r_n = divmod(n, 3)
    b, r_u = divmod(u, 3)
    score = 0
    for count, power in [(b, 16), (r_u, 4), (r_n, 1)]:
        take = min(count, k)
        score += take * power
        k -= take
    return score
"""

examples = """
solution(1, 1) == 1
solution(3, 1) == 4
solution(9, 1) == 16
solution(10, 2) == 17
solution(25, 10) == 41
"""

