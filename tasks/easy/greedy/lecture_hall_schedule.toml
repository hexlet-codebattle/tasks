level             = "easy"
name              = "lecture_hall_schedule"
tags              = ["greedy", "sorting", "intervals", "arrays"]
time_to_solve_sec = 250

description_en = """
You are given a lecture hall where several professors want to give their lectures. To make a schedule, professors submitted requests represented as an array of two integers `[start, end]`, denoting the start time and end time of the lecture.

Lectures are half-open intervals `[start, end)`, meaning a new lecture can start at the exact moment another one finishes without a break.

Determine the **maximum** number of requests that can be fulfilled without any overlaps.
"""

description_ru = """
Дана лекционная аудитория, в которой несколько профессоров хотят прочесть свои лекции. Для составления расписания профессора подали заявки, каждая из которых представлена массивом из двух целых чисел `[start, end]`, обозначающих время начала и конца лекции.

Лекция считается открытым полуинтервалом `[start, end)`, то есть какая-то лекция может начаться ровно в момент окончания другой, без перерыва.

Составьте расписание занятий так, чтобы выполнить **максимальное** количество заявок.
"""

limits = """
- $0 \\leq \\text{len}(\\text{requests}) \\leq 10^5$
- $0 \\leq \\text{start} < \\text{end} \\leq 10^9$
"""

solution = """
def solution(requests: list) -> int:
    count = end_time = 0
    for s, e in sorted(requests, key=lambda x: x[1]):
        if s >= end_time:
            count, end_time = count + 1, e
    return count
"""

examples = """
solution([[1, 3], [2, 4], [3, 5]]) == 2
solution([[1, 2], [2, 3], [3, 4]]) == 3
solution([[0, 10], [1, 3], [3, 5], [5, 7], [7, 9]]) == 4
"""

