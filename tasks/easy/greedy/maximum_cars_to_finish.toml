level             = "easy"
name              = "maximum_cars_to_finish"
tags              = ["greedy", "math", "arrays"]
time_to_solve_sec = 250

description_en = """
Sergey is organizing a road trip with his friends. There are $n$ cars, and each car needs exactly $x$ liters of fuel to reach the destination. The $i$-th car currently has $a_i$ liters of fuel.

To maximize the number of cars that reach the destination, Sergey can choose any subset of cars, drain all their fuel, and redistribute it equally among them. He can repeat this process any number of times.

Given the required fuel $x$ and the array $a$ containing the initial fuel of each car, return the maximum number of cars that can successfully reach the destination.
"""

description_ru = """
Сергей решил организовать автопробег с друзьями. Всего участвует $n$ автомобилей, и чтобы доехать до финиша, каждой машине требуется ровно $x$ литров топлива. Изначально в $i$-й машине находится $a_i$ литров бензина.

Чтобы до финиша доехало как можно больше участников, Сергей может выбрать любое подмножество автомобилей, слить с них всё топливо и затем поровну распределить его между этими же машинами. Эту операцию он может применять любое количество раз.

Учитывая необходимое количество топлива $x$ и массив $a$, описывающий начальное количество бензина в каждой машине, верните максимальное число автомобилей, которые смогут добраться до финиша.
"""

limits = """
- $1 \leq x \leq 10^4$
- $1 \leq \text{len}(a) \leq 10^5$
- $0 \leq a_i \leq 10^4$
"""

solution = """
def solution(x: int, a: list) -> int:
    a.sort(reverse=True)
    total = 0
    for i in range(len(a)):
        total += a[i]
        if total < x * (i + 1):
            return i
    return len(a)
"""

examples = """
solution(10, [1, 2, 3]) == 0
solution(4, [3, 2, 6, 2]) == 2
solution(5, [10, 10, 10]) == 3
"""

