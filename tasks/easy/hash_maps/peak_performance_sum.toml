level             = "easy"
name              = "peak_performance_sum"
tags              = ["hashmaps", "arrays"]
time_to_solve_sec = 250

description_en = """
You are given two arrays of the same length: `teams` and `scores`.
For each index $i$, `teams[i]` is the name of a team, and `scores[i]` is the score they achieved in a specific match.

A team can participate in multiple matches. Find the **highest** score achieved by each unique team across all their matches, and return the sum of these highest scores.

If the input arrays are empty, return $0$.
"""

description_ru = """
Вам даны два массива одинаковой длины: `teams` и `scores`.
Для каждого индекса $i$, `teams[i]` — это название команды, а `scores[i]` — количество баллов, которые она получила в конкретном матче.

Команда может участвовать в нескольких матчах. Найдите **наивысший** балл, полученный каждой уникальной командой за все её матчи, и верните сумму этих наивысших баллов.

Если входные массивы пусты, верните $0$.
"""

limits = """
- $0 \\leq \\text{len}(\\text{teams}) = \\text{len}(\\text{scores}) \\leq 10^4$
- $-10^4 \\leq \\text{scores}[i] \\leq 10^4$
"""

solution = """
def solution(teams: list, scores: list) -> int:
    best = {}
    for t, s in zip(teams, scores):
        best[t] = max(best.get(t, s), s)
    return sum(best.values())
"""

examples = """
solution([], []) == 0
solution(["A", "A"], [-10, -5]) == -5
solution(["A", "B"], [10, 20]) == 30
solution(["A", "B", "A"], [10, 20, 30]) == 50
"""

