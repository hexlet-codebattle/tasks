level             = "easy"
name              = "add_two_fractions"
tags              = ["math", "algorithms"]
time_to_solve_sec = 200

description_en = """
Given two rational fractions $a/b$ and $c/d$, calculate their sum.

Return the result as an irreducible fraction $m/n$, represented as an array of two integers `[m, n]`.
"""

description_ru = """
Даны две рациональные дроби $a/b$ и $c/d$. Вычислите их сумму.

Верните результат в виде несократимой дроби $m/n$, представленной как массив из двух целых чисел `[m, n]`.
"""

limits = """
- $-1000 \\leq a, c \\leq 1000$
- $1 \\leq b, d \\leq 1000$
"""

solution = """
import math

def solution(a: int, b: int, c: int, d: int) -> list:
    num = a * d + c * b
    den = b * d
    g = math.gcd(num, den)
    return [num // g, den // g]
"""

examples = """
solution(1, 2, 1, 2) == [1, 1]
solution(1, 3, 1, 6) == [1, 2]
solution(2, 5, 1, 5) == [3, 5]
"""

[[input_signature]]
argument_name = "a"
[input_signature.type]
name = "integer"

[[input_signature]]
argument_name = "b"
[input_signature.type]
name = "integer"

[[input_signature]]
argument_name = "c"
[input_signature.type]
name = "integer"

[[input_signature]]
argument_name = "d"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "array"
[output_signature.type.nested]
name = "integer"

