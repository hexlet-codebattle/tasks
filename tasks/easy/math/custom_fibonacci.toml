level             = "easy"
name              = "custom_fibonacci"
tags              = ["math", "algorithms"]
time_to_solve_sec = 200

description_en = """
Given three integers `f0`, `f1`, and `n`. 

Consider a sequence where the first two elements are `f0` and `f1`, and every subsequent element is the sum of the two preceding elements. 

Return `True` if `n` belongs to this sequence, and `False` otherwise.
"""

description_ru = """
Даны три целых числа `f0`, `f1` и `n`. 

Рассмотрим последовательность, первые два элемента которой равны `f0` и `f1`, а каждый последующий элемент равен сумме двух предыдущих. 

Верните `True`, если `n` принадлежит этой последовательности, и `False` в противном случае.
"""

limits = """
- $0 \\leq f_0, f_1 \\leq 1000$
- $0 \\leq n \\leq 10^9$
"""

solution = """
def solution(f0: int, f1: int, n: int) -> bool:
    if n in (f0, f1): return True
    if f0 == 0 and f1 == 0: return False
    while f1 < n:
        f0, f1 = f1, f0 + f1
    return f1 == n
"""

examples = """
solution(0, 1, 5) == True
solution(2, 1, 4) == True
solution(10, 20, 100) == False
"""

[[input_signature]]
argument_name = "f0"
[input_signature.type]
name = "integer"

[[input_signature]]
argument_name = "f1"
[input_signature.type]
name = "integer"

[[input_signature]]
argument_name = "n"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "boolean"

