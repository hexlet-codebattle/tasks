level             = "easy"
name              = "expanded_notation_array"
tags              = ["math", "strings", "parsing", "arrays"]
time_to_solve_sec = 250

description_en = """
Expanded Notation means an integer is written as the sum of its digits multiplied with its place value (in strictly descending powers of $10$). 

For example, $85063 = 8 \\times 10000 + 5 \\times 1000 + 6 \\times 10 + 3$. 

You are given an array of strings `arr`, where each string represents a natural number in expanded notation. The strings use `"x"` for multiplication and `"+"` for addition, with no spaces. Your task is to compute the sum for each string and return an array of these numbers in their normal integer form.
"""

description_ru = """
Развернутая запись означает, что целое число записано в виде суммы его цифр, умноженных на их разрядное значение (в строго убывающих степенях $10$).

Например, $85063 = 8 \\times 10000 + 5 \\times 1000 + 6 \\times 10 + 3$.

Вам дан массив строк `arr`, где каждая строка представляет натуральное число в развернутой записи. В строках используется `"x"` для умножения и `"+"` для сложения, без пробелов. Ваша задача — вычислить сумму для каждой строки и вернуть массив этих чисел в обычном целом виде.
"""

limits = """
- $1 \\leq \\text{len}(arr) \\leq 100$
- $3 \\leq \\text{len}(arr[i]) \\leq 100$
- $arr[i]$ contains only digits, `"x"`, and `"+"`
- Place values are powers of $10$
"""

solution = """
def solution(arr: list) -> list:
    return [sum(int(part.split('x')[0]) * int(part.split('x')[1]) for part in s.split('+')) for s in arr]
"""

examples = """
solution(["1x1"]) == [1]
solution(["9x10", "1x1"]) == [90, 1]
solution(["7x100+2x1", "8x10000+5x1000+6x10+3"]) == [702, 85063]
"""

[[input_signature]]
argument_name = "arr"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "string"

[output_signature.type]
name = "array"
[output_signature.type.nested]
name = "integer"

[[asserts]]
arguments = [["8x10000+5x1000+6x10+3x1"]]
comment   = "Complex example from description"
expected  = [85063]

[[asserts]]
arguments = [["7x100+2x1", "1x1"]]
comment   = "Multiple elements"
expected  = [702, 1]

[[asserts]]
arguments = [["1x1"]]
comment   = "Single digit"
expected  = [1]

[[asserts]]
arguments = [["9x10", "4x100000+2x100"]]
