level             = "easy"
name              = "is_armstrong_number"
tags              = ["math", "numbers"]
time_to_solve_sec = 250

description_en = """
An Armstrong number (or Narcissistic number) is a number that is the sum of its own digits each raised to the power of the number of digits.

For example, $153$ is an Armstrong number because it has $3$ digits and $1^3 + 5^3 + 3^3 = 1 + 125 + 27 = 153$.

Given an integer $n$, return `true` if it is an Armstrong number, and `false` otherwise.
"""

description_ru = """
лДлИЛЂл╗лЙ лљЛђл╝ЛЂЛѓЛђлЙлйл│л░ Рђћ ЛЇЛѓлЙ лйл░ЛѓЛЃЛђл░л╗ЛїлйлЙлх ЛЄлИЛЂл╗лЙ, л║лЙЛѓлЙЛђлЙлх Лђл░л▓лйлЙ ЛЂЛЃл╝л╝лх ЛЂл▓лЙлИЛЁ ЛєлИЛёЛђ, л▓лЙлил▓лхл┤лхлйлйЛІЛЁ л▓ ЛЂЛѓлхл┐лхлйЛї, Лђл░л▓лйЛЃЛј л║лЙл╗лИЛЄлхЛЂЛѓл▓ЛЃ лхл│лЙ ЛєлИЛёЛђ.

лЮл░л┐ЛђлИл╝лхЛђ, $153$ ЛЈл▓л╗ЛЈлхЛѓЛЂЛЈ ЛЄлИЛЂл╗лЙл╝ лљЛђл╝ЛЂЛѓЛђлЙлйл│л░, Лѓл░л║ л║л░л║ лЙлйлЙ ЛЂлЙЛЂЛѓлЙлИЛѓ лИли $3$ ЛєлИЛёЛђ лИ $1^3 + 5^3 + 3^3 = 1 + 125 + 27 = 153$.

лћл░лйлЙ Лєлхл╗лЙлх ЛЄлИЛЂл╗лЙ $n$. лњлхЛђлйлИЛѓлх `true`, лхЛЂл╗лИ лЙлйлЙ ЛЈл▓л╗ЛЈлхЛѓЛЂЛЈ ЛЄлИЛЂл╗лЙл╝ лљЛђл╝ЛЂЛѓЛђлЙлйл│л░, лИ `false` л▓ л┐ЛђлЙЛѓлИл▓лйлЙл╝ ЛЂл╗ЛЃЛЄл░лх.
"""

limits = """
- $0 \\leq n \\leq 10^9$
"""

solution = """
def solution(n: int) -> bool:
    s = str(n)
    p = len(s)
    return sum(int(d)**p for d in s) == n
"""

examples = """
solution(0) == True
solution(10) == False
solution(153) == True
solution(1634) == True
"""

[[input_signature]]
argument_name = "n"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "boolean"

