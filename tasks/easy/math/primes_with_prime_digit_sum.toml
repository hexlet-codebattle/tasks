level             = "easy"
name              = "primes_with_prime_digit_sum"
tags              = ["math", "numbers"]
time_to_solve_sec = 250

description_en = """
Find all prime numbers in the inclusive range $[a, b]$ such that the sum of their digits is also a prime number. Return the result as an array.
"""

description_ru = """
Найдите все простые числа на отрезке $[a, b]$ (включительно), сумма цифр которых также является простым числом. Верните результат в виде массива.
"""

limits = """
- $1 \\leq a \\leq b \\leq 10^4$
"""

solution = """
def solution(a: int, b: int) -> list:
    P = lambda n: n > 1 and all(n % i for i in range(2, int(n**0.5) + 1))
    return [x for x in range(a, b + 1) if P(x) and P(sum(map(int, str(x))))]
"""

examples = """
solution(30, 40) == []
solution(10, 20) == [11]
solution(1, 10) == [2, 3, 5, 7]
"""

