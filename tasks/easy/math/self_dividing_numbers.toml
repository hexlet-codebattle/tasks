level             = "easy"
name              = "self_dividing_numbers"
tags              = ["math", "loops"]
time_to_solve_sec = 240

description_en = """
A self-dividing number is a number that is divisible by every digit it contains. 
For example, `128` is a self-dividing number because $128 \\pmod 1 = 0$, $128 \\pmod 2 = 0$, and $128 \\pmod 8 = 0$.

A self-dividing number is not allowed to contain the digit `0`.

Given two integers `left` and `right`, return an array of all the self-dividing numbers in the range `[left, right]` (inclusive).
"""

description_ru = """
Самоделящееся число — это число, которое без остатка делится на каждую из своих цифр. 
Например, `128` является самоделящимся числом, так как $128 \\pmod 1 = 0$, $128 \\pmod 2 = 0$ и $128 \\pmod 8 = 0$.

Самоделящееся число не должно содержать цифру `0`.

Даны два целых числа `left` и `right`. Верните массив всех самоделящихся чисел в диапазоне `[left, right]` (включительно).
"""

limits = """
- $1 \\leq \\text{left} \\leq \\text{right} \\leq 10^4$
"""

solution = """
def solution(left: int, right: int) -> list[int]:
    return [n for n in range(left, right + 1) if all(int(d) != 0 and n % int(d) == 0 for d in str(n))]
"""

examples = """
solution(47, 49) == [48]
solution(10, 15) == [11, 12, 15]
solution(1, 10) == [1, 2, 3, 4, 5, 6, 7, 8, 9]
"""

