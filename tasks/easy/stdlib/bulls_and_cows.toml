level             = "easy"
name              = "bulls_and_cows"
tags              = ["stdlib"]
time_to_solve_sec = 300

description_en = """
You are given two 4-digit integers: `secret` and `guess`.

For each position:

- If a digit from `guess` matches the digit in `secret` at the **same position**, it counts as a **bull**.
- If a digit from `guess` appears in `secret` at a **different position**, it may count as a **cow**.

Return an array `[bulls, cows]` with the number of bulls and cows for this pair.

Each position in `secret` can be matched with at most one position in `guess`.
"""

description_ru = """
Даны два четырёхзначных числа: `secret` и `guess`.

Для каждой позиции:

- Если цифра из `guess` совпадает с цифрой в `secret` на **том же месте**, это **бык**.
- Если цифра из `guess` присутствует в `secret` на **другом месте**, она может считаться **коровой**.

Верните массив `[bulls, cows]` с количеством быков и коров для этой пары.

Каждая позиция в `secret` может быть сопоставлена не более чем с одной позицией в `guess`.
"""

limits = """
- $1000 \\leq secret \\leq 9999$
- $1000 \\leq guess \\leq 9999$
"""

solution = """
from collections import Counter
from typing import List

def solution(secret: int, guess: int) -> List[int]:
    s, g = str(secret), str(guess)
    bulls = sum(s[i] == g[i] for i in range(4))
    cs, cg = Counter(s), Counter(g)
    cows = sum(min(cs[d], cg[d]) for d in cs) - bulls
    return [bulls, cows]
"""

examples = """
solution(1234, 5678) == [0, 0]
solution(4271, 4271) == [4, 0]
solution(9876, 6789) == [0, 4]
solution(4020, 5447) == [0, 1]
solution(3451, 1112) == [0, 1]
solution(9429, 1999) == [1, 1]
"""

