level             = "easy"
name              = "captains_favorite_letter"
tags              = ["strings", "hash_maps", "pirates"]
time_to_solve_sec = 120

description_en = """
The captain studies a non-empty log word `log`.

Return the letter that appears most often. If several letters have the same highest frequency, return the lexicographically smallest one.
"""

description_ru = """
Капитан изучает непустое слово `log` из корабельного журнала.

Верните букву, которая встречается чаще всего. Если несколько букв имеют одинаковую максимальную частоту, верните лексикографически наименьшую из них.
"""

limits = """
- $1 \\leq \\text{len}(\\text{log}) \\leq 100$
- $\\text{log} \\in \\{a{-}z\\}^*$
"""

solution = """
def solution(log: str) -> str:
    return min(log, key=lambda c: (-log.count(c), c))
"""

examples = """
solution("a") == "a"
solution("ab") == "a"
solution("cannon") == "n"
solution("mississippi") == "i"
"""

[[input_signature]]
argument_name = "log"
[input_signature.type]
name = "string"

[output_signature.type]
name = "string"

