expected  = ["    1    ", "123456789"]

[[asserts]]
arguments = [["12", "123456789"]]
comment   = "2 chars to 9 chars (extra space left)"
expected  = ["    12   ", "123456789"]

[[asserts]]
arguments = [["123", "123456789"]]
comment   = "3 chars to 9 chars"
expected  = ["   123   ", "123456789"]

[[asserts]]
arguments = [["1234", "123456789"]]
comment   = "4 chars to 9 chars (extra space left)"
expected  = ["   1234  ", "123456789"]

[[asserts]]
arguments = [["12345", "123456789"]]
comment   = "5 chars to 9 chars"
expected  = ["  12345  ", "123456789"]

[[asserts]]
arguments = [["123456", "123456789"]]
comment   = "6 chars to 9 chars (extra space left)"
expected  = ["  123456 ", "123456789"]

[[asserts]]
arguments = [["1234567", "123456789"]]
comment   = "7 chars to 9 chars"
expected  = [" 1234567 ", "123456789"]

[[asserts]]
arguments = [["12345678", "123456789"]]
comment   = "8 chars to 9 chars (extra space left)"
