[[asserts]]
arguments = [["word", ""]]
comment   = "Empty string padded to even length"
expected  = ["word", "    "]

[[asserts]]
arguments = [["even", "odd lengths"]]
comment   = "4 chars to 11 chars (extra space left)"
expected  = ["    even   ", "odd lengths"]

[[asserts]]
arguments = [["same", "size"]]
comment   = "Already same size"
expected  = ["same", "size"]

[[asserts]]
arguments = [["a", "a", "a"]]
comment   = "All identical"
expected  = ["a", "a", "a"]

[[asserts]]
arguments = [[" ", "   "]]
comment   = "Spaces only"
expected  = ["   ", "   "]

[[asserts]]
arguments = [["x", "y", "longword"]]
