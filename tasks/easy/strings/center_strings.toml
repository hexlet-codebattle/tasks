level             = "easy"
name              = "center_strings"
tags              = ["strings", "formatting"]
time_to_solve_sec = 200

description_en = """
Given an array of strings, return a new array where each string is centered to the length of the longest string in the original array, padded with spaces (`" "`).

If the padding is uneven (i.e., the difference between the maximum length and the current string's length is odd), apply the standard Python `str.center()` behavior:
- If the target width is odd and the margin is odd, the extra space goes to the **left**.
- Otherwise, the extra space goes to the **right**.

If the input array is empty, return an empty array.
"""

description_ru = """
Дан массив строк. Верните новый массив, в котором каждая строка отцентрирована по длине самой длинной строки в исходном массиве и дополнена пробелами (`" "`).

Если количество добавляемых пробелов нечетное, используйте стандартное поведение метода `str.center()` в Python:
- Если целевая ширина нечетная и общая разница нечетная, дополнительный пробел добавляется **слева**.
- Во всех остальных случаях дополнительный пробел добавляется **справа**.

Если исходный массив пуст, верните пустой массив.
"""

limits = """
- $0 \\leq \\text{len}(strings) \\leq 100$
- $0 \\leq \\text{len}(strings[i]) \\leq 100$
"""

solution = """
def solution(strings: list[str]) -> list[str]:
    if not strings:
        return []
    max_len = max(len(s) for s in strings)
    return [s.center(max_len) for s in strings]
"""

examples = """
solution([]) == []
solution(["hi", "hello"]) == ["  hi ", "hello"]
solution(["a", "abc", "a"]) == [" a ", "abc", " a "]
"""

[[input_signature]]
argument_name = "strings"
[input_signature.type]
name = "array"
[input_signature.type.nested]
name = "string"

[output_signature.type]
name = "array"
[output_signature.type.nested]
name = "string"

[[asserts]]
arguments = [[]]
comment   = "Empty array"
expected  = []

[[asserts]]
arguments = [["hello"]]
comment   = "Single string"
expected  = ["hello"]

[[asserts]]
arguments = [["a", "abc"]]
comment   = "Odd max len, odd string, even margin -> equal padding"
expected  = [" a ", "abc"]

[[asserts]]
arguments = [["ab", "abcd"]]
comment   = "Even max len, even string, even margin -> equal padding"
expected  = [" ab ", "abcd"]

[[asserts]]
arguments = [["a", "abcd"]]
comment   = "Even max len, odd string, odd margin -> extra space right"
expected  = [" a  ", "abcd"]

[[asserts]]
arguments = [["abc", "a"]]
comment   = "Max string first"
expected  = ["abc", " a "]

[[asserts]]
arguments = [["hi", "hello"]]
comment   = "Odd max len, even string, odd margin -> extra space left"
expected  = ["  hi ", "hello"]

[[asserts]]
arguments = [["", "a"]]
comment   = "Odd max len, empty string, odd margin"
expected  = [" ", "a"]

[[asserts]]
arguments = [["", "ab"]]
comment   = "Even max len, empty string, even margin"
expected  = ["  ", "ab"]

[[asserts]]
arguments = [["A", "BB", "CCC", "DDDD"]]
comment   = "Multiple lengths with max 4"
expected  = [" A  ", " BB ", "CCC ", "DDDD"]

[[asserts]]
