level             = "easy"
name              = "longest_balanced_segment"
tags              = ["strings", "hash-map", "algorithms"]
time_to_solve_sec = 250

description_en = """
A binary segment is called balanced if it contains the same number of `$0$`s and `$1$`s.

Given a binary string `$s$`, determine the length of the longest balanced contiguous segment. If no such segment exists, return `$0$`.
"""

description_ru = """
Бинарный сегмент называется сбалансированным, если он содержит одинаковое количество `$0$` и `$1$`.

Дана бинарная строка `$s$`. Определите длину самого длинного сбалансированного непрерывного сегмента. Если такого сегмента не существует, верните `$0$`.
"""

limits = """
- $0 \\leq \\text{len}(s) \\leq 10^5$
- $s[i] \\in \\{0, 1\\}$
"""

solution = """
def solution(s: str) -> int:
    d, c, r = {0: -1}, 0, 0
    for i, v in enumerate(s):
        c += 1 if v == '1' else -1
        if c in d: r = max(r, i - d[c])
        else: d[c] = i
    return r
"""

examples = """
solution("0") == 0
solution("01") == 2
solution("111") == 0
solution("1100") == 4
solution("11010") == 4
solution("101010") == 6
"""

