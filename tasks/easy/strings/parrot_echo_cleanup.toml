level             = "easy"
name              = "parrot_echo_cleanup"
tags              = ["strings", "pirates"]
time_to_solve_sec = 120

description_en = """
A noisy parrot stretches sounds by repeating the same letter many times in a row.

Given a pirate cry string `cry`, remove consecutive duplicate letters and return the cleaned string.
"""

description_ru = """
Шумный попугай растягивает звуки, повторяя одну и ту же букву подряд много раз.

Дана строка `cry` с пиратским криком. Удалите подряд идущие одинаковые буквы и верните очищенную строку.
"""

limits = """
- $1 \\leq \\text{len}(\\text{cry}) \\leq 100$
- $\\text{cry} \\in \\{a{-}z\\}^*$
"""

solution = """
def solution(cry: str) -> str:
    out = ""
    for c in cry:
        if not out or out[-1] != c:
            out += c
    return out
"""

examples = """
solution("a") == "a"
solution("aa") == "a"
solution("arrr") == "ar"
solution("treaaasure") == "treasure"
"""

[[input_signature]]
argument_name = "cry"
[input_signature.type]
name = "string"

[output_signature.type]
name = "string"

