level             = "easy"
name              = "signal_flag_groups"
tags              = ["strings", "pirates"]
time_to_solve_sec = 150

description_en = """
A row of signal flags is written as a string `flags`. Equal adjacent letters represent a continuous group of the same flag.

Return the length of the longest continuous group.
"""

description_ru = """
Ряд сигнальных флагов записан строкой `flags`. Одинаковые соседние буквы образуют непрерывную группу одного и того же флага.

Верните длину самой длинной непрерывной группы.
"""

limits = """
- $0 \\leq \\text{len}(\\text{flags}) \\leq 100$
- $\\text{flags} \\in \\{A{-}Z\\}^*$
"""

solution = """
def solution(flags: str) -> int:
    best = cur = 0
    for i, ch in enumerate(flags):
        cur = cur + 1 if i and ch == flags[i - 1] else 1
        best = max(best, cur)
    return best if flags else 0
"""

examples = """
solution("") == 0
solution("A") == 1
solution("AA") == 2
solution("ABCDDDDD") == 5
"""

[[input_signature]]
argument_name = "flags"
[input_signature.type]
name = "string"

[output_signature.type]
name = "integer"

