level             = "easy"
name              = "string_blocks_transposition"
tags              = ["strings", "formatting"]
time_to_solve_sec = 200

description_en = """
You are given a string `s` and an integer `k`.

If the length of the string `s` is not divisible by `k`, return an empty string `""`.
Otherwise, split the string into blocks of length `k`. Construct and return a new string by taking the first character from each block, then the second character from each block, and so on, up to the `k`-th character.
"""

description_ru = """
Дана строка `s` и целое число `k`.

Если длина строки `s` не делится на `k`, верните пустую строку `""`.
В противном случае разбейте строку на блоки длины `k`. Сформируйте и верните новую строку, беря сначала первый символ из каждого блока, затем второй символ из каждого блока, и так далее, вплоть до `k`-го символа.
"""

limits = """
- $0 \\leq \\text{len}(s) \\leq 100$
- $1 \\leq k \\leq 100$
"""

solution = """
def solution(s: str, k: int) -> str:
    if len(s) % k != 0:
        return ""
    return "".join(s[i::k] for i in range(k))
"""

examples = """
solution("abcdef", 2) == "acebdf"
solution("abcdef", 3) == "adbecf"
solution("abc", 2) == ""
"""

[[input_signature]]
argument_name = "s"
[input_signature.type]
name = "string"

[[input_signature]]
argument_name = "k"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "string"

