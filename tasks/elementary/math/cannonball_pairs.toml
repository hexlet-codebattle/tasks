level             = "elementary"
name              = "cannonball_pairs"
tags              = ["math", "pirates"]
time_to_solve_sec = 120

description_en = """
A pirate quartermaster counts loose cannonballs before battle. There are `cannonballs` total cannonballs, but `cracked` of them are damaged and cannot be used.

Every firing set needs exactly `2` usable cannonballs.

Return how many complete firing sets can be made.
"""

description_ru = """
Пиратский квартирмейстер считает свободные пушечные ядра перед боем. Всего есть `cannonballs` ядер, но `cracked` из них повреждены и не могут быть использованы.

Для каждого залпа нужна ровно пара из `2` исправных ядер.

Верните, сколько полных пар для залпа можно собрать.
"""

limits = """
- $0 \\leq \\text{cannonballs} \\leq 10^9$
- $0 \\leq \\text{cracked} \\leq \\text{cannonballs}$
"""

solution = """
def solution(cannonballs: int, cracked: int) -> int:
    return (cannonballs - cracked) // 2
"""

examples = """
solution(0, 0) == 0
solution(3, 1) == 1
solution(8, 2) == 3
solution(999, 5) == 497
"""

