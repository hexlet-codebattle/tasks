level             = "elementary"
name              = "helm_direction"
tags              = ["strings", "pirates"]
time_to_solve_sec = 120

description_en = """
The helmsman receives a signed turn command `turn`.

- If `turn < 0`, the ship turns to `"port"`.
- If `turn > 0`, the ship turns to `"starboard"`.
- If `turn = 0`, the ship goes `"ahead"`.

Return the correct command word.
"""

description_ru = """
Рулевой получает знаковую команду поворота `turn`.

- Если `turn < 0`, корабль поворачивает в `"port"`.
- Если `turn > 0`, корабль поворачивает в `"starboard"`.
- Если `turn = 0`, корабль идет `"ahead"`.

Верните правильное слово-команду.
"""

limits = """
- $-10^9 \\leq \\text{turn} \\leq 10^9$
"""

solution = """
def solution(turn: int) -> str:
    return "port" if turn < 0 else "starboard" if turn > 0 else "ahead"
"""

examples = """
solution(0) == "ahead"
solution(-1) == "port"
solution(2) == "starboard"
solution(300) == "starboard"
"""

[[input_signature]]
argument_name = "turn"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "string"

