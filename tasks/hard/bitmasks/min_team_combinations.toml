level             = "hard"
name              = "min_team_combinations"
tags              = ["bitmask", "brute_force", "algo"]
time_to_solve_sec = 500

description_en = """
You are given an array of integers `people`, where each integer represents the skill set of a person as a bitmask (the $i$-th bit is $1$ if they have the $i$-th skill, and $0$ otherwise). You are also given an integer `target_skills` representing all the skills required for a project as a bitmask.

Find the minimum number of people needed to form a team that covers all required skills. If it is impossible to cover all required skills, return `-1`.

*Note:* The number of people is small enough that you can iterate through all possible combinations (subsets) of people, but iterating through all permutations will be too slow.
"""

description_ru = """
Дан массив целых чисел `people`, где каждое число представляет набор навыков человека в виде битовой маски ($i$-й бит равен $1$, если у человека есть $i$-й навык, и $0$ в противном случае). Также дано целое число `target_skills`, представляющее все необходимые для проекта навыки в виде битовой маски.

Найдите минимальное количество людей, необходимое для формирования команды, которая закроет все требуемые навыки. Если это сделать невозможно, верните `-1`.

*Примечание:* Количество людей достаточно мало, чтобы перебрать все возможные комбинации (подмножества) людей, однако перебор всех перестановок будет слишком медленным.
"""

limits = """
- $1 \\leq \\text{len}(\\text{people}) \\leq 15$
- $0 \\leq \\text{people}[i] \\leq 65535$
- $1 \\leq \\text{target\\_skills} \\leq 65535$
"""

solution = """
def solution(people: list[int], target_skills: int) -> int:
    n = len(people)
    ans = float('inf')
    for i in range(1 << n):
        mask = 0
        cnt = 0
        for j in range(n):
            if (i >> j) & 1:
                mask |= people[j]
                cnt += 1
        if (mask & target_skills) == target_skills:
            if cnt < ans:
                ans = cnt
    return ans if ans != float('inf') else -1
"""

examples = """
solution([1], 3) == -1
solution([3], 3) == 1
solution([1, 2], 3) == 2
solution([1, 2, 4, 8], 15) == 4
"""

