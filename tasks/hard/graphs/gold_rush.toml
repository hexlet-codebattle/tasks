level             = "hard"
name              = "gold_rush"
tags              = ["graphs", "bipartite", "matching"]
time_to_solve_sec = 700

description_en = """
There are $M$ pirates and $K$ vacant positions on different ships. Each pirate is willing to work only on certain ships. Find a way to assign the maximum number of pirates to jobs, with each pirate assigned to at most one ship and each ship assigned at most one pirate.
"""

description_ru = """
Есть $M$ пиратов и $K$ вакантных мест на разных судах. Каждый пират готов работать только на определённых кораблях. Найдите способ пристроить максимальное количество людей на работу, при этом каждый пират может быть назначен не более чем на один корабль, а каждый корабль — не более чем на одного пирата.
"""

limits = """
- $0 \\leq M \\leq 100$
- $0 \\leq K \\leq 100$
- $0 \\leq \\text{len}(\\text{preferences}[i]) \\leq K$
- $0 \\leq \\text{preferences}[i][j] < K$
"""

solution = """
def solution(M: int, K: int, preferences: list[list[int]]) -> int:
    # adjacency list
    adj = preferences
    match_ship = [-1] * K
    match_pirate = [-1] * M
    
    def dfs(pirate, seen):
        for ship in adj[pirate]:
            if seen[ship]:
                continue
            seen[ship] = True
            if match_ship[ship] == -1 or dfs(match_ship[ship], seen):
                match_ship[ship] = pirate
                match_pirate[pirate] = ship
                return True
        return False
    
    result = 0
    for p in range(M):
        seen = [False] * K
        if dfs(p, seen):
            result += 1
    return result
"""

examples = """
solution(2, 2, [[0], [1]]) == 2
solution(2, 2, [[0, 1], []]) == 1
solution(3, 3, [[0], [0], [0]]) == 1
"""

