level             = "hard"
name              = "gold_rush"
tags              = ["graphs", "bipartite", "matching"]
time_to_solve_sec = 500

description_en = """
There are $m$ pirates, $k$ vacant positions on different ships, and a list `preferences` where `preferences[i]` contains the indices of ships pirate $i$ is willing to work on. Find the maximum number of pirates that can be assigned to ships, with each pirate assigned to at most one ship and each ship assigned to at most one pirate.
"""

description_ru = """
Есть $m$ пиратов, $k$ вакантных мест на разных судах и список `preferences`, где `preferences[i]` содержит индексы кораблей, на которых пират $i$ готов работать. Найдите максимальное количество пиратов, которых можно назначить на корабли, если каждый пират может быть назначен не более чем на один корабль, а каждый корабль — не более чем на одного пирата.
"""

limits = """
- $0 \\leq m \\leq 100$
- $0 \\leq k \\leq 100$
- $0 \\leq \\text{len}(\\text{preferences}[i]) \\leq k$
- $0 \\leq \\text{preferences}[i][j] < k$
"""

solution = """
def solution(pirate_count: int, ship_count: int, preferences: list[list[int]]) -> int:
    match = [-1] * ship_count

    def dfs(pirate: int, seen: list[bool]) -> bool:
        for ship in preferences[pirate]:
            if not seen[ship]:
                seen[ship] = True
                if match[ship] == -1 or dfs(match[ship], seen):
                    match[ship] = pirate
                    return True
        return False

    return sum(dfs(p, [False] * ship_count) for p in range(pirate_count))
"""

examples = """
solution(2, 2, [[0], [1]]) == 2
solution(2, 2, [[0, 1], []]) == 1
solution(3, 3, [[0], [0], [0]]) == 1
"""

