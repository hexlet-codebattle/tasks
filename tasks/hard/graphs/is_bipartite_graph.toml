level             = "hard"
name              = "is_bipartite_graph"
tags              = ["graphs", "bfs", "dfs"]
time_to_solve_sec = 600

description_en = """
You are given an undirected graph represented as an adjacency list, where `graph[i]` is a list of nodes connected to node `i`.

Return `True` if and only if it is bipartite.

A graph is bipartite if its nodes can be partitioned into two independent sets such that every edge connects a node in one set to a node in the other. The graph may not be connected.
"""

description_ru = """
Вам дан неориентированный граф, представленный в виде списка смежности, где `graph[i]` — это список вершин, соединенных с вершиной `i`.

Верните `True`, если граф является двудольным.

Граф является двудольным, если его вершины можно разбить на два независимых множества так, что каждое ребро соединяет вершину из одного множества с вершиной из другого. Граф может быть несвязным.
"""

limits = """
- $1 \\leq \\text{len}(\\text{graph}) \\leq 100$
- $0 \\leq \\text{graph}[i][j] < \\text{len}(\\text{graph})$
- $i \\neq \\text{graph}[i][j]$
"""

solution = """
def solution(graph: list[list[int]]) -> bool:
    color = {}
    for i in range(len(graph)):
        if i not in color:
            color[i] = 0
            q = [i]
            while q:
                u = q.pop()
                for v in graph[u]:
                    if v not in color:
                        color[v] = color[u] ^ 1
                        q.append(v)
                    elif color[v] == color[u]:
                        return False
    return True
"""

examples = """
solution([[]]) == True
solution([[1], [0]]) == True
solution([[1, 2], [0, 2], [0, 1]]) == False
solution([[1, 3], [0, 2], [1, 3], [0, 2]]) == True
"""

