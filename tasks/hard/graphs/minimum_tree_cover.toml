level             = "hard"
name              = "minimum_tree_cover"
tags              = ["graphs", "trees", "dp"]
time_to_solve_sec = 900

description_en = """
Given an undirected tree with `n` vertices labeled from $0$ to $n - 1$ and an array of `edges`, find the minimum number of vertices needed to cover all edges.

A vertex is considered to cover all of its directly connected (incident) edges.
"""

description_ru = """
Дано неориентированное дерево с `n` вершинами, пронумерованными от $0$ до $n - 1$, и массив `edges`. Найдите минимальное количество вершин, необходимое для покрытия всех ребер.

Вершина считается покрывающей все свои непосредственно подключенные (инцидентные) ребра.
"""

limits = """
- $1 \leq n \leq 10^5$
- $\text{len}(\text{edges}) = n - 1$
- $0 \leq \text{edges}[i][0], \text{edges}[i][1] < n$
"""

solution = """
def solution(n: int, edges: list) -> int:
    if n <= 1:
        return 0
        
    adj = [[] for _ in range(n)]
    for u, v in edges:
        adj[u].append(v)
        adj[v].append(u)
        
    order = []
    parent = [-1] * n
    q = [0]
    
    while q:
        u = q.pop(0)
        order.append(u)
        for v in adj[u]:
            if v != parent[u]:
                parent[v] = u
                q.append(v)
                
    inc = [1] * n
    exc = [0] * n
    
    for u in reversed(order):
        for v in adj[u]:
            if v != parent[u]:
                inc[u] += min(inc[v], exc[v])
                exc[u] += inc[v]
                
    return min(inc[0], exc[0])
"""

examples = """
solution(1, []) == 0
solution(2, [[0, 1]]) == 1
solution(3, [[0, 1], [0, 2]]) == 1
solution(4, [[0, 1], [1, 2], [2, 3]]) == 2
solution(5, [[0, 1], [1, 2], [2, 3], [3, 4]]) == 2
"""

