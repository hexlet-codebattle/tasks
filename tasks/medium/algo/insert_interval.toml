level             = "medium"
name              = "insert_interval"
tags              = ["algo", "intervals", "sorting"]
time_to_solve_sec = 400

description_en = """
You are given an array of non-overlapping `intervals` where $\\text{intervals}[i] = [start_i, end_i]$ represent the start and the end of the $i$-th interval. The array `intervals` is sorted in ascending order by $start_i$.

You are also given an array $\\text{new\\_interval} = [start, end]$ that represents the start and end of another interval.

Insert $\\text{new\\_interval}$ into `intervals` such that `intervals` is still sorted in ascending order by $start_i$ and `intervals` still does not have any overlapping intervals (merge overlapping intervals if necessary).

Return `intervals` after the insertion.
"""

description_ru = """
Вам дан массив непересекающихся интервалов `intervals`, где $\\text{intervals}[i] = [start_i, end_i]$ представляют начало и конец $i$-го интервала. Массив `intervals` отсортирован по возрастанию $start_i$.

Вам также дан массив $\\text{new\\_interval} = [start, end]$, который представляет собой начало и конец другого интервала.

Вставьте $\\text{new\\_interval}$ в `intervals` так, чтобы `intervals` оставался отсортированным по возрастанию $start_i$ и не содержал пересекающихся интервалов (при необходимости объедините пересекающиеся интервалы).

Верните `intervals` после вставки.
"""

limits = """
- $0 \\leq \\text{len}(\\text{intervals}) \\leq 10^4$
- $\\text{len}(\\text{intervals}[i]) == 2$
- $\\text{len}(\\text{new\\_interval}) == 2$
- $0 \\leq \\text{start}_i \\leq \\text{end}_i \\leq 10^5$
- $0 \\leq \\text{new\\_interval}[0] \\leq \\text{new\\_interval}[1] \\leq 10^5$
"""

solution = """
def solution(intervals: list[list[int]], new_interval: list[int]) -> list[list[int]]:
    res = []
    i = 0
    n = len(intervals)
    
    while i < n and intervals[i][1] < new_interval[0]:
        res.append(intervals[i])
        i += 1
        
    start, end = new_interval[0], new_interval[1]
    while i < n and intervals[i][0] <= end:
        start = min(start, intervals[i][0])
        end = max(end, intervals[i][1])
        i += 1
    res.append([start, end])
    
    while i < n:
        res.append(intervals[i])
        i += 1
        
    return res
"""

examples = """
solution([], [5, 7]) == [[5, 7]]
solution([[1, 5]], [2, 3]) == [[1, 5]]
solution([[1, 3], [6, 9]], [2, 5]) == [[1, 5], [6, 9]]
solution([[1, 2], [3, 5], [6, 7], [8, 10], [12, 16]], [4, 8]) == [[1, 2], [3, 10], [12, 16]]
"""

