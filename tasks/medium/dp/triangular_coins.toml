level             = "medium"
name              = "triangular_coins"
tags              = ["math", "dp", "algorithms"]
time_to_solve_sec = 400

description_en = """
You have $5$ different types of coins, each with a value equal to one of the first $5$ triangular numbers: $1$, $3$, $6$, $10$, and $15$. All coin types are available in unlimited quantities. 

Your task is to determine the minimum number of coins sufficient to make a sum of exactly $n$.
"""

description_ru = """
У вас есть $5$ различных типов монет, каждый из которых имеет значение, равное одному из первых $5$ треугольных чисел: $1$, $3$, $6$, $10$ и $15$. Все типы монет имеются в неограниченном количестве. 

Ваша задача — определить, какого минимального количества монет достаточно, чтобы набрать сумму ровно $n$.
"""

limits = """
- $0 \\leq n \\leq 10^4$
"""

solution = """
def solution(n: int) -> int:
    dp = [0] + [n] * n
    for i in range(1, n + 1):
        for c in [1, 3, 6, 10, 15]:
            if i >= c:
                dp[i] = min(dp[i], dp[i - c] + 1)
    return dp[n]
"""

examples = """
solution(0) == 0
solution(2) == 2
solution(12) == 2
solution(100) == 7
"""

