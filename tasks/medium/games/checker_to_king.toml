level             = "medium"
name              = "checker_to_king"
tags              = ["math", "dynamic_programming", "games"]
time_to_solve_sec = 400

description_en = """
On an $8 \\times 8$ chessboard, there is a single white checker. It can move diagonally forward (one step up-left or up-right).

Given its starting column `x` (from $1$ to $8$, counting from the left) and row `y` (from $1$ to $8$, counting from the bottom), return the number of ways it can reach the last row ($y = 8$) to become a king. The checker cannot move outside the board limits.
"""

description_ru = """
На шахматной доске $8 \\times 8$ стоит одна белая шашка. Она может двигаться по диагонали вперед (на одну клетку влево-вверх или вправо-вверх).

По заданному начальному столбцу `x` (от $1$ до $8$, считая слева) и строке `y` (от $1$ до $8$, считая снизу), верните количество способов, которыми она может дойти до последней строки ($y = 8$) и стать дамкой. Шашка не может выходить за пределы доски.
"""

limits = """
- $1 \\leq x \\leq 8$
- $1 \\leq y \\leq 8$
"""

solution = """
def solution(x: int, y: int) -> int:
    dp = [[0] * 10 for _ in range(9)]
    dp[y][x] = 1
    for r in range(y + 1, 9):
        for c in range(1, 9):
            dp[r][c] = dp[r-1][c-1] + dp[r-1][c+1]
    return sum(dp[8])
"""

examples = """
solution(1, 8) == 1
solution(1, 7) == 1
solution(2, 7) == 2
solution(4, 1) == 103
"""

