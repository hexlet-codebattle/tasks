level             = "medium"
name              = "valid_sudoku"
tags              = ["arrays", "matrix", "hash"]
time_to_solve_sec = 600

description_en = """
Determine if a $9 \\times 9$ Sudoku board is valid. Only the filled cells need to be validated according to the following rules:

1. Each row must contain the digits `"1"`-`"9"` without repetition.
2. Each column must contain the digits `"1"`-`"9"` without repetition.
3. Each of the nine $3 \\times 3$ sub-boxes of the grid must contain the digits `"1"`-`"9"` without repetition.

The Sudoku board could be partially filled, where empty cells are filled with the character `"."`.
"""

description_ru = """
Определите, является ли поле для судоку $9 \\times 9$ валидным. Только заполненные ячейки необходимо проверять в соответствии со следующими правилами:

1. Каждая строка должна содержать цифры от `"1"` до `"9"` без повторений.
2. Каждый столбец должен содержать цифры от `"1"` до `"9"` без повторений.
3. Каждый из девяти подквадратов $3 \\times 3$ должен содержать цифры от `"1"` до `"9"` без повторений.

Поле судоку может быть частично заполнено, пустые ячейки обозначаются символом `"."`.
"""

limits = """
- $\\text{len}(\\text{board}) = 9$
- $\\text{len}(\\text{board}[i]) = 9$
- $\\text{board}[i][j] \\in \\{"1", \\dots, "9", "."\\}$
"""

solution = """
def solution(board: list) -> bool:
    r = [set() for _ in range(9)]
    c = [set() for _ in range(9)]
    b = [set() for _ in range(9)]
    
    for i in range(9):
        for j in range(9):
            v = board[i][j]
            if v != ".":
                k = (i // 3) * 3 + j // 3
                if v in r[i] or v in c[j] or v in b[k]:
                    return False
                r[i].add(v)
                c[j].add(v)
                b[k].add(v)
    return True
"""

examples = """
solution([
  ["5","3",".",".","7",".",".",".","."],
  ["6",".",".","1","9","5",".",".","."],
  [".","9","8",".",".",".",".","6","."],
  ["8",".",".",".","6",".",".",".","3"],
  ["4",".",".","8",".","3",".",".","1"],
  ["7",".",".",".","2",".",".",".","6"],
  [".","6",".",".",".",".","2","8","."],
  [".",".",".","4","1","9",".",".","5"],
  [".",".",".",".","8",".",".","7","9"]
]) == True

solution([
