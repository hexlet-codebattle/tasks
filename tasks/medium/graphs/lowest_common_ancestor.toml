level             = "medium"
name              = "lowest_common_ancestor"
tags              = ["trees", "graphs", "algorithms"]
time_to_solve_sec = 400

description_en = """
You are given a tree of $n$ nodes represented by a `parent` array, where `parent[i]` is the parent of node $i$. The root of the tree has `parent[root] = -1`.

Given two nodes $u$ and $v$, return their Lowest Common Ancestor (LCA). The LCA is the deepest node that is an ancestor of both $u$ and $v$.
"""

description_ru = """
Вам дано дерево из $n$ узлов, представленное массивом `parent`, где `parent[i]` — родитель узла $i$. Корень дерева имеет `parent[root] = -1`.

Учитывая два узла $u$ и $v$, верните их наименьшего общего предка (LCA). LCA — это самый глубокий узел, который является предком как для $u$, так и для $v$.
"""

limits = """
- $1 \leq \text{len}(\text{parent}) \leq 1000$
- $-1 \leq \text{parent}[i] < \text{len}(\text{parent})$
- $0 \leq u < \text{len}(\text{parent})$
- $0 \leq v < \text{len}(\text{parent})$
"""

solution = """
def solution(parent: list, u: int, v: int) -> int:
    ancestors = set()
    while u != -1:
        ancestors.add(u)
        u = parent[u]
    while v != -1:
        if v in ancestors:
            return v
        v = parent[v]
    return -1
"""

examples = """
solution([-1, 0, 0], 1, 2) == 0
solution([-1, 0, 1, 2], 3, 1) == 1
solution([-1, 0, 0, 1, 1, 2], 3, 4) == 1
"""

