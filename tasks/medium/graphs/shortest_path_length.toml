level             = "medium"
name              = "shortest_path_length"
tags              = ["graphs", "bfs", "algorithms"]
time_to_solve_sec = 400

description_en = """
You are given an unweighted, undirected graph with $n$ nodes numbered from $0$ to $n - 1$. You are also given an array `edges`, where $\\text{edges}[i] = [u_i, v_i]$ represents a bidirectional edge between node $u_i$ and node $v_i$.

Find the length of the shortest path between the `start` node and the `end` node. The length of a path is the number of edges in it.

If there is no valid path between `start` and `end`, return `-1`.
"""

description_ru = """
Вам дан невзвешенный неориентированный граф с $n$ вершинами, пронумерованными от $0$ до $n - 1$. Также дан массив `edges`, где $\\text{edges}[i] = [u_i, v_i]$ представляет собой двунаправленное ребро между вершиной $u_i$ и вершиной $v_i$.

Найдите длину кратчайшего пути между вершиной `start` и вершиной `end`. Длина пути — это количество рёбер в нём.

Если пути между `start` и `end` не существует, верните `-1`.
"""

limits = """
- $1 \\leq n \\leq 1000$
- $0 \\leq \\text{len}(\\text{edges}) \\leq 2000$
- $0 \\leq u_i, v_i < n$
- $0 \\leq \\text{start}, \\text{end} < n$
- $u_i \\neq v_i$
"""

solution = """
def solution(n: int, edges: list, start: int, end: int) -> int:
    g = [[] for _ in range(n)]
    for u, v in edges:
        g[u].append(v)
        g[v].append(u)
        
    dist = [-1] * n
    dist[start] = 0
    q = [start]
    
    for u in q:
        for v in g[u]:
            if dist[v] == -1:
                dist[v] = dist[u] + 1
                q.append(v)
                
    return dist[end]
"""

examples = """
solution(4, [[0, 1], [2, 3]], 0, 3) == -1
solution(3, [[0, 1], [1, 2], [0, 2]], 0, 2) == 1
solution(5, [[0, 1], [1, 2], [2, 3], [3, 4]], 0, 4) == 4
"""

