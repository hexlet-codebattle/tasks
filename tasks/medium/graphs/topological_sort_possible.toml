level             = "medium"
name              = "topological_sort_possible"
tags              = ["graphs", "algorithms", "topological_sort"]
time_to_solve_sec = 400

description_en = """
You are given `n` nodes labeled from $0$ to $n - 1$ and a list of directed `edges`.

Each edge $[u, v]$ indicates that node $u$ must appear before node $v$ in a topological ordering. 

Return `True` if it is possible to topologically sort the graph (i.e., it contains no directed cycles), and `False` otherwise.
"""

description_ru = """
Вам дано `n` вершин, пронумерованных от $0$ до $n - 1$, и список ориентированных ребер `edges`. 

Каждое ребро $[u, v]$ означает, что вершина $u$ должна идти перед вершиной $v$ в топологической сортировке. 

Верните `True`, если граф можно отсортировать топологически (то есть в нем нет ориентированных циклов), и `False` в противном случае.
"""

limits = """
- $1 \\leq n \\leq 10^4$
- $0 \\leq \\text{len}(\\text{edges}) \\leq 10^4$
- $\\text{edges}[i] = [u, v]$
- $0 \\leq u, v < n$
"""

solution = """
def solution(n: int, edges: list) -> bool:
    from graphlib import TopologicalSorter, CycleError
    
    graph = {i: set() for i in range(n)}
    for u, v in edges:
        graph[v].add(u)
        
    try:
        TopologicalSorter(graph).prepare()
        return True
    except CycleError:
        return False
"""

examples = """
solution(1, []) == True
solution(2, [[0, 1]]) == True
solution(2, [[0, 1], [1, 0]]) == False
solution(4, [[0, 1], [1, 2], [2, 3]]) == True
"""

