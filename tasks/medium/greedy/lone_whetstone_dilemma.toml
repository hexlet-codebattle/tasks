level             = "medium"
name              = "lone_whetstone_dilemma"
tags              = ["greedy", "sorting"]
time_to_solve_sec = 450

description_en = """
You are the lone whetstone keeper on a pirate ship. Each pirate brings a sabre that needs sharpening. The i‑th sabre requires $T_i$ minutes of work and has a daily fury coefficient $D_i$ (how much the pirate's fury increases per minute of waiting). You can process the sabres in any order. Once you start a sabre, you must finish it without interruption. The total fury is defined as sum over sabres of (completion time) $\\times D_i$, where completion time is the total time spent on all sabres processed up to and including that sabre.

Return the minimum possible total fury.
"""

description_ru = """
Вы — единственный точильщик на пиратском корабле. Каждый пират приносит саблю, которую нужно заточить. $i$‑я сабля требует $T_i$ минут работы и имеет коэффициент ярости $D_i$ (насколько увеличивается ярость пирата за каждую минуту ожидания). Вы можете обрабатывать сабли в любом порядке. Начав саблю, вы должны закончить её без перерывов. Общая ярость определяется как сумма по саблям (время завершения) $\\times D_i$, где время завершения — это общее время, затраченное на все сабли, обработанные до этой сабли включительно.

Верните минимально возможную общую ярость.
"""

limits = """
- $1 \\leq N \\leq 1000$
- $1 \\leq T_i \\leq 10^4$
- $1 \\leq D_i \\leq 10^4$
"""

solution = """
def solution(T: list[int], D: list[int]) -> int:
    # sort by T_i / D_i ascending
    pairs = sorted(zip(T, D), key=lambda x: x[0] / x[1])
    total = 0
    cur = 0
    for t, d in pairs:
        cur += t
        total += cur * d
    return total
"""

examples = """
solution([1], [1]) == 1
solution([2, 3], [1, 1]) == 7
solution([3, 2], [1, 1]) == 7
solution([1, 2, 3], [1, 2, 3]) == 25
"""

