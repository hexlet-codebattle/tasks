level             = "medium"
name              = "lone_whetstone_dilemma"
tags              = ["greedy", "sorting"]
time_to_solve_sec = 450

description_en = """
You are the lone whetstone keeper on a pirate ship. Each pirate brings a sabre that needs sharpening.

You are given two arrays of equal length $n$:

- `times[i]` is the number of minutes needed to sharpen the $i$-th sabre
- `furies[i]` is the fury coefficient of the $i$-th pirate

You may process the sabres in any order. Once you start a sabre, you must finish it without interruption.

If a sabre is completed at time $c$, it contributes $c \\cdot f$ to the total fury, where $f$ is that sabre's fury coefficient. So if the chosen order is $p_1, p_2, \\dots, p_n$, then

$$
c_k = \\text{times}[p_1] + \\text{times}[p_2] + \\dots + \\text{times}[p_k]
$$

and the total fury is

$$
\\sum_{k=1}^{n} c_k \\cdot \\text{furies}[p_k]
$$

Return the minimum possible total fury.
"""

description_ru = """
Вы — единственный точильщик на пиратском корабле. Каждый пират приносит саблю, которую нужно заточить.

Даны два массива одинаковой длины $n$:

- `times[i]` — сколько минут нужно, чтобы заточить $i$-ю саблю
- `furies[i]` — коэффициент ярости $i$-го пирата

Вы можете обрабатывать сабли в любом порядке. Начав саблю, вы должны закончить её без перерывов.

Если сабля завершена в момент времени $c$, то её вклад в общую ярость равен $c \\cdot f$, где $f$ — коэффициент ярости этой сабли. То есть если выбран порядок $p_1, p_2, \\dots, p_n$, то

$$
c_k = \\text{times}[p_1] + \\text{times}[p_2] + \\dots + \\text{times}[p_k]
$$

а общая ярость равна

$$
\\sum_{k=1}^{n} c_k \\cdot \\text{furies}[p_k]
$$

Верните минимально возможную общую ярость.
"""

limits = """
- $1 \\leq n \\leq 100$
- $1 \\leq T_i \\leq 100$
- $1 \\leq D_i \\leq 100$
"""

solution = """
def solution(times: list[int], furies: list[int]) -> int:
    # sort by T_i / D_i ascending
    pairs = sorted(zip(times, furies), key=lambda x: x[0] / x[1])
    total = 0
    cur = 0
    for t, d in pairs:
        cur += t
        total += cur * d
    return total
"""

examples = """
solution([1], [1]) == 1
solution([2, 3], [1, 1]) == 7
solution([3, 2], [1, 1]) == 7
solution([1, 2, 3], [1, 2, 3]) == 25
"""

