level             = "medium"
name              = "maximize_product"
tags              = ["math", "strings", "greedy"]
time_to_solve_sec = 400

description_en = """
You are given two strings `x` and `y` of the same length, consisting of digits from `1` to `9`.

You can perform the following operation any number of times: swap the $i$-th digit of `x` with the $i$-th digit of `y`.

Return the maximum possible product of the integers represented by `x` and `y` after performing any number of swaps.
"""

description_ru = """
Вам даны две строки `x` и `y` одинаковой длины, состоящие из цифр от `1` до `9`.

Вы можете выполнять следующую операцию любое количество раз: менять местами $i$-ю цифру в `x` и $i$-ю цифру в `y`.

Верните максимально возможное произведение чисел `x` и `y`, которого можно достичь с помощью этих операций.
"""

limits = """
- $1 \\leq \\text{len}(x) = \\text{len}(y) \\leq 5$
- $x_i, y_i \\in \\{1, 2, \\dots, 9\\}$
"""

solution = """
def solution(x: str, y: str) -> int:
    rx, ry, diff = "", "", False
    for a, b in zip(x, y):
        if a == b:
            rx += a; ry += b
        elif not diff:
            rx += max(a, b); ry += min(a, b); diff = True
        else:
            rx += min(a, b); ry += max(a, b)
    return int(rx) * int(ry)
"""

examples = """
solution("1", "9") == 9
solution("73", "31") == 2343
solution("123", "321") == 39483
"""

