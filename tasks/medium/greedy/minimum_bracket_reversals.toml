level             = "medium"
name              = "minimum_bracket_reversals"
tags              = ["greedy", "strings"]
time_to_solve_sec = 400

description_en = """
Given a string `s` consisting only of curly brackets `{` and `}`, determine the minimum number of bracket reversals required to make the string balanced.

A reversal changes `{` to `}` or `}` to `{`.
If it is impossible to balance the string, return `-1`.
"""

description_ru = """
Дана строка `s`, состоящая только из фигурных скобок `{` и `}`, определите минимальное количество переворотов скобок, необходимое для того, чтобы сделать строку сбалансированной.

Переворот меняет `{` на `}` или `}` на `{`.
Если сбалансировать строку невозможно, верните `-1`.
"""

limits = """
- $0 \\leq \\text{len}(s) \\leq 10^5$
"""

solution = """
def solution(s: str) -> int:
    if len(s) % 2 != 0:
        return -1
    
    open_brackets = 0
    close_brackets = 0
    
    for char in s:
        if char == '{':
            open_brackets += 1
        else:
            if open_brackets > 0:
                open_brackets -= 1
            else:
                close_brackets += 1
                
    return (open_brackets + 1) // 2 + (close_brackets + 1) // 2
"""

examples = """
solution("}{") == 2
solution("{{{") == -1
solution("{{{}") == 1
"""

[[input_signature]]
argument_name = "s"
[input_signature.type]
name = "string"

[output_signature.type]
name = "integer"

[[asserts]]
arguments = [""]
comment   = "Empty string"
