level             = "medium"
name              = "minimum_refuels"
tags              = ["greedy", "math", "algorithms"]
time_to_solve_sec = 400

description_en = """
Andrey is driving from point A to point B. The distance between these points is `n` kilometers. With a full tank, the car can travel `k` kilometers.

You are given an array `stations` containing the coordinates of gas stations relative to point A. The coordinates are strictly sorted in ascending order.

Determine the minimum number of refuels Andrey needs to make to reach point B successfully.

He starts with a full tank at point A. If it is impossible to reach point B, return `-1`.
"""

description_ru = """
Андрей едет из пункта A в пункт B на автомобиле. Расстояние между этими пунктами равно `n` километров. С полным баком автомобиль способен проехать `k` километров.

Дана карта в виде массива `stations` с координатами бензоколонок относительно пункта A, отсортированными строго по возрастанию.

Определите минимальное число заправок, которые придется сделать Андрею, чтобы успешно достичь пункта B.

При выезде из пункта A бак был полон. Если достичь пункта B невозможно, верните `-1`.
"""

limits = """
- $1 \\leq n \\leq 10^5$
- $1 \\leq k \\leq 10^5$
- $0 \\leq \\text{len}(\\text{stations}) \\leq 10^4$
- $0 < \\text{stations}[i] < n$
"""

solution = """
def solution(n: int, k: int, stations: list) -> int:
    stops = [0] + stations + [n]
    refuels, current = 0, 0
    for i in range(len(stops) - 1):
        if stops[i+1] - stops[i] > k:
            return -1
        if current + k < stops[i+1]:
            refuels += 1
            current = stops[i]
    return refuels
"""

examples = """
solution(10, 5, []) == -1
solution(5, 10, [1, 2, 3]) == 0
solution(10, 3, [2, 5, 7]) == 3
"""

