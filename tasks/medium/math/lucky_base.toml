level             = "medium"
name              = "lucky_base"
tags              = ["math", "number_theory", "brute_force"]
time_to_solve_sec = 400

description_en = """
Schoolboy Vasya likes numbers that end with his lucky digit `k`. Every time he sees a natural number `n`, he tries to find a base `d` ($d > 2$) such that the representation of `n` in base `d` ends with the maximum possible number of digits `k`.

Write a function that, given `n` and `k`, finds such `d`.
- A valid base must be strictly greater than $2$ and strictly greater than $k$ (since $k$ is a digit in base $d$).
- If there are multiple bases providing the same maximum number of trailing `k`s, return the smallest one.
- If no base can produce even a single `k` at the end, return the smallest valid base evaluated (which is $\\max(3, k + 1)$).
"""

description_ru = """
Школьнику Васе нравятся числа, которые заканчиваются счастливыми для него цифрами `k`. Поэтому каждый раз, когда он видит какое-нибудь натуральное число `n`, он сразу пытается подобрать такое основание системы счисления `d` ($d > 2$), чтобы число `n` в этой системе заканчивалось как можно большим количеством цифр `k`.

Напишите функцию, которая по заданным `n` и `k` найдет такое `d`.
- Допустимое основание должно быть строго больше $2$ и строго больше $k$ (так как $k$ — это цифра в системе с основанием $d$).
- Если таких оснований несколько, верните наименьшее из них.
- Если ни одно основание не дает ни одной цифры `k` на конце, верните наименьшее проверяемое основание (то есть $\\max(3, k + 1)$).
"""

limits = """
- $1 \\leq n \\leq 10^4$
- $0 \\leq k \\leq 10^4$
"""

solution = """
def solution(n: int, k: int) -> int:
    best_d, max_len = max(3, k + 1), -1
    for d in range(max(3, k + 1), n + 2):
        t, c = n, 0
        while t > 0 and t % d == k:
            c += 1
            t //= d
        if c > max_len:
            max_len, best_d = c, d
    return best_d
"""

examples = """
solution(4, 2) == 3
solution(10, 0) == 5
solution(21, 1) == 4
solution(20, 2) == 9
"""

