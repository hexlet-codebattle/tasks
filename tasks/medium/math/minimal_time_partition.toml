level             = "medium"
name              = "minimal_time_partition"
tags              = ["math", "algorithms", "optimization"]
time_to_solve_sec = 450

description_en = """
On a distant planet, a day lasts exactly $n$ seconds. 

Represent the number $n$ as a product of three natural numbers $a, b, c$ ($a \cdot b \cdot c = n$) such that the difference between the maximum and minimum of these three numbers is **minimal**.

Return the three numbers as a list sorted in ascending order.
"""

description_ru = """
На некоторой планете сутки длятся ровно $n$ секунд.

Представьте число $n$ в виде произведения трёх натуральных чисел $a, b, c$ ($a \cdot b \cdot c = n$) так, чтобы разность между максимальным и минимальным из этих чисел была **минимальной**.

Верните эти три числа в виде списка, отсортированного по возрастанию.
"""

limits = """
- $1 \leq n \leq 10^9$
"""

solution = """
def solution(n: int) -> list:
    res, min_diff = [], n
    for a in range(1, int(n**(1/3)) + 2):
        if n % a == 0:
            k = n // a
            for b in range(int(k**0.5), a - 1, -1):
                if k % b == 0:
                    c = k // b
                    if c - a < min_diff:
                        min_diff, res = c - a, [a, b, c]
                    break
    return sorted(res)
"""

examples = """
solution(1) == [1, 1, 1]
solution(24) == [2, 3, 4]
solution(60) == [3, 4, 5]
solution(1000) == [10, 10, 10]
"""

