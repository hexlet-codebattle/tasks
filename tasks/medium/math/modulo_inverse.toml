level             = "medium"
name              = "modulo_inverse"
tags              = ["math", "number_theory", "modular_arithmetic"]
time_to_solve_sec = 450

description_en = """
Given an integer $a$ and a prime number $m$, find the modular multiplicative inverse of $a$ modulo $m$.

The modular inverse of $a$ modulo $m$ is an integer $x$ such that $(a \\times x) \\pmod m = 1$.

If the inverse does not exist (for example, if $a$ is a multiple of $m$), return $-1$.
"""

description_ru = """
Даны целое число $a$ и простое число $m$. Найдите модульное мультипликативное обратное для $a$ по модулю $m$.

Модульное обратное для $a$ по модулю $m$ — это такое целое число $x$, что $(a \\times x) \\pmod m = 1$.

Если обратного не существует (например, если $a$ кратно $m$), верните $-1$.
"""

limits = """
- $-10^9 \\leq a \\leq 10^9$
- $2 \\leq m \\leq 10^9+7$
- $m$ is always a prime number
"""

solution = """
def solution(a: int, m: int) -> int:
    a = a % m
    if a == 0:
        return -1
    return pow(a, m - 2, m)
"""

examples = """
solution(0, 5) == -1
solution(3, 11) == 4
solution(10, 17) == 12
"""

[[input_signature]]
argument_name = "a"
[input_signature.type]
name = "integer"

[[input_signature]]
argument_name = "m"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "integer"

