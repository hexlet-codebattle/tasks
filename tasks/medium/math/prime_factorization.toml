level             = "medium"
name              = "prime_factorization"
tags              = ["math", "algorithms"]
time_to_solve_sec = 400

description_en = """
Given an integer $n$, decompose it into prime factors and return the result as a string.

The prime factors must be ordered in ascending order. Represent the decomposition in the format `"p1^k1*p2^k2*..."`. If a prime factor has a power of $1$, omit the exponent.
"""

description_ru = """
Дано целое число $n$. Разложите его на простые множители и верните результат в виде строки.

Простые множители должны быть расположены в порядке возрастания. Представьте разложение в формате `"p1^k1*p2^k2*..."`. Если степень множителя равна $1$, опустите показатель степени.
"""

limits = """
- $2 \\leq n \\leq 10^9$
"""

solution = """
def solution(n: int) -> str:
    res, d = [], 2
    while d * d <= n:
        c = 0
        while n % d == 0:
            c, n = c + 1, n // d
        if c:
            res.append(f"{d}^{c}" if c > 1 else str(d))
        d += 1
    if n > 1:
        res.append(str(n))
    return "*".join(res)
"""

examples = """
solution(2) == "2"
solution(12) == "2^2*3"
solution(1008) == "2^4*3^2*7"
"""

[[input_signature]]
argument_name = "n"
[input_signature.type]
name = "integer"

[output_signature.type]
name = "string"

