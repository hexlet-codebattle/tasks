level             = "medium"
name              = "twin_prime_count"
tags              = ["math", "algorithms"]
time_to_solve_sec = 400

description_en = """
A prime number $p$ is considered to have a "pair" if there exists another prime number $x$ such that $|p - x| = 2$.

Given a segment $[a, b]$, find the total number of prime numbers within this segment that have a pair.

Note that the pair $x$ does not necessarily have to belong to the segment $[a, b]$.
"""

description_ru = """
Назовём парой простого числа $p$ такое простое число $x$, что $|p - x| = 2$.

На отрезке $[a, b]$ найдите количество простых чисел, имеющих пару.

Обратите внимание, что парное число $x$ не обязательно должно принадлежать отрезку $[a, b]$.
"""

limits = """
- $0 \\leq a \\leq b \\leq 10^5$
"""

solution = """
def solution(a: int, b: int) -> int:
    def is_prime(n: int) -> bool:
        if n < 2: return False
        for i in range(2, int(n**0.5) + 1):
            if n % i == 0: return False
        return True
    return sum(1 for p in range(a, b + 1) if is_prime(p) and (is_prime(p - 2) or is_prime(p + 2)))
"""

examples = """
solution(3, 3) == 1
solution(1, 5) == 2
solution(10, 20) == 4
"""

