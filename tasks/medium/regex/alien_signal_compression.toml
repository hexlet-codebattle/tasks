level             = "medium"
name              = "alien_signal_compression"
tags              = ["strings", "regex"]
time_to_solve_sec = 400

description_en = """
You intercept an alien transmission and need to compress it to save storage space.

The transmission is a string containing words (only English letters), numbers (valid 32-bit integers without leading zeros), spaces, tabs, and newlines. Compress the message using the following three steps:

1. Replace all newlines (`\n`) with semicolons (`;`), then remove all spaces and tabs.
2. Reduce every word (a contiguous sequence of letters) to just its first letter, preserving the original case.
3. Compress numbers ending in consecutive zeros using standard scientific notation (e.g., `1750000` becomes `175e4`). Only do this if the resulting string is **strictly shorter** than the original number.

Return the fully compressed transmission.
"""

description_ru = """
Вы перехватили инопланетную передачу, и ее необходимо сжать для экономии места.

Передача представляет собой строку, содержащую слова (только английские буквы), числа (корректные 32-битные целые числа без ведущих нулей), пробелы, табуляции и символы перевода строки. Сожмите сообщение, выполнив следующие три шага:

1. Замените все переводы строк (`\n`) на точки с запятой (`;`), затем удалите все пробелы и табуляции.
2. Сократите каждое слово (непрерывную последовательность букв) до первой буквы, сохранив её регистр.
3. Сожмите числа, оканчивающиеся на идущие подряд нули, используя стандартную нотацию (например, `1750000` становится `175e4`). Делайте это **только если** полученная строка строго короче исходного числа.

Верните полностью сжатую передачу.
"""

limits = """
- $1 \leq \text{len}(\text{text}) \leq 10^4$
- $\text{text}$ contains only English letters, digits, spaces, tabs, and newline characters.
- All numbers are valid 32-bit integers without leading zeros (except for $0$ itself).
"""

solution = """
import re

def solution(text: str) -> str:
    text = re.sub(r'[a-zA-Z]+', lambda m: m.group()[0], text)
    
    def comp_num(m):
        v = m.group()
        s = v.rstrip('0')
        return min(v, f"{s}e{len(v)-len(s)}" if s else v, key=len)
        
    text = re.sub(r'\\d+', comp_num, text)
    return text.replace(' ', '').replace('\\t', '').replace('\\n', ';')
"""

examples = """
solution("Alpha 1000") == "A1e3"
solution("Hello\\nWorld") == "H;W"
solution("100 1000") == "1001e3"
solution("A 0 B 0") == "A0B0"
"""

