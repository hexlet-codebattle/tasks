level             = "medium"
name              = "broadside_salvo"
tags              = ["stack", "arrays"]
time_to_solve_sec = 450

description_en = """
The view of an enemy fort from the sea is represented as a histogram (an array of wall heights). Your cannons fire only horizontally. Find the rectangular area of the wall of maximum size that can be destroyed with a single precise broadside salvo.
"""

description_ru = """
Вид вражеского форта с моря представлен как гистограмма (массив высот стен). Ваши пушки стреляют только горизонтально. Найдите прямоугольную область стены максимальной площади, которую можно разнести одним точным массированным залпом.
"""

limits = """
- $0 \\leq n \\leq 100$
- $0 \\leq h_i \\leq 100$
"""

solution = """
def solution(heights: list[int]) -> int:
    stack = []
    max_area = 0
    n = len(heights)
    for i in range(n + 1):
        cur = heights[i] if i < n else 0
        while stack and cur < heights[stack[-1]]:
            h = heights[stack.pop()]
            left = stack[-1] if stack else -1
            width = i - left - 1
            max_area = max(max_area, h * width)
        stack.append(i)
    return max_area
"""

examples = """
solution([2,1,5,6,2,3]) == 10
solution([2,4]) == 4
solution([1]) == 1
solution([]) == 0
"""

